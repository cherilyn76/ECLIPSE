<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ECLIPSE Font Preview</title>

<style>

@font-face{
    font-family:'ECLIPSE';
    src:url('Eclipse.woff') format('woff');
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#f6f6f6;
    color:#222;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:60px 30px;
}

h1{
    font-size:48px;
    margin-bottom:10px;
}

p{
    color:#666;
    margin-bottom:40px;
}

.controls{

    display:flex;
    gap:20px;
    flex-wrap:wrap;
    margin-bottom:30px;
}

.control{
    display:flex;
    flex-direction:column;
    gap:8px;
}

input[type=range]{
    width:180px;
}

textarea{

    width:100%;
    height:170px;

    padding:18px;

    border:none;

    border-radius:16px;

    font-size:18px;

    resize:vertical;

    outline:none;

    margin-bottom:35px;
}

.preview{

    background:white;

    border-radius:20px;

    padding:40px;

    min-height:300px;

    font-family:'ECLIPSE';

    font-size:120px;

    line-height:1.05;

    letter-spacing:0px;

    word-break:break-word;

    transition:.2s;
}

button{

    border:none;

    padding:12px 22px;

    border-radius:12px;

    cursor:pointer;

    background:black;

    color:white;

    font-size:15px;
}

button:hover{

    opacity:.8;
}

.dark{

    background:#111;

    color:white;
}

.dark textarea{

    background:#1d1d1d;

    color:white;
}

.dark .preview{

    background:#191919;

}

@media(max-width:700px){

.preview{

font-size:70px;

}

h1{

font-size:34px;

}

}

</style>

</head>

<body>

<div class="container">

<h1>ECLIPSE</h1>

<p>Type anything to preview the font.</p>

<div class="controls">

<div class="control">

<label>Font Size</label>

<input type="range" id="size" min="20" max="250" value="120">

</div>

<div class="control">

<label>Letter Spacing</label>

<input type="range" id="spacing" min="-5" max="20" value="0">

</div>

<div class="control">

<label>Line Height</label>

<input type="range" id="lineheight" min="80" max="180" value="105">

</div>

<div class="control">

<button id="darkBtn">Dark Mode</button>

</div>

</div>

<textarea id="text">ECLIPSE

The quick brown fox jumps over the lazy dog.

1234567890</textarea>

<div id="preview" class="preview">
ECLIPSE<br><br>
The quick brown fox jumps over the lazy dog.<br><br>
1234567890
</div>

</div>

<script>

const text=document.getElementById("text");
const preview=document.getElementById("preview");

text.addEventListener("input",()=>{

preview.innerHTML=text.value.replace(/\n/g,"<br>");

});

document.getElementById("size").oninput=function(){

preview.style.fontSize=this.value+"px";

}

document.getElementById("spacing").oninput=function(){

preview.style.letterSpacing=this.value+"px";

}

document.getElementById("lineheight").oninput=function(){

preview.style.lineHeight=this.value/100;

}

document.getElementById("darkBtn").onclick=function(){

document.body.classList.toggle("dark");

}

</script>

</body>
</html>
