<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ECLIPSE Font Preview</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

@font-face{
    font-family:'ECLIPSE';
    src:url('Eclipse.woff') format('woff');
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:#fafafa;
    color:#222;
    transition:.3s;
}

.container{

    width:min(1200px,92%);
    margin:auto;
    padding:60px 0;

}

.header{

display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:40px;

}

h1{

font-size:48px;
font-weight:700;

}

button{

background:#111;
color:white;
border:none;
padding:12px 24px;
border-radius:12px;
font-family:Poppins;
cursor:pointer;

}

.controls{

display:flex;
gap:30px;
flex-wrap:wrap;
margin-bottom:45px;

}

.control{

display:flex;
flex-direction:column;
gap:8px;

}

label{

font-size:14px;
font-weight:500;

}

input[type=range]{

width:180px;

}

.editor{

background:white;
border-radius:10px;
padding:36px;
box-shadow:0 8px 25px rgba(0,0,0,.05);

}

#preview{

width:100%;
min-height:220px;

font-family:'ECLIPSE';
font-size:120px;
line-height:1;
letter-spacing:0;

outline:none;
border:none;
background:transparent;

overflow:hidden;
white-space:pre-wrap;
word-break:break-word;

}

.dark{

background:#111;
color:white;

}

.dark .editor{

background:#1b1b1b;

}

.dark button{

background:white;
color:black;

}

@media(max-width:768px){

#preview{

font-size:70px;

min-height:250px;

}

.controls{

gap:20px;

}

.header{

flex-direction:column;
align-items:flex-start;
gap:20px;

}

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div>

<h1>ECLIPSE</h1>
<p>Type anything below.</p>

</div>

<button id="darkBtn">Dark Mode</button>

</div>

<div class="controls">

<div class="control">

<label>Font Size</label>

<input id="size" type="range" min="30" max="250" value="120">

</div>

<div class="control">

<label>Letter Spacing</label>

<input id="spacing" type="range" min="-5" max="20" value="0">

</div>

<div class="control">

<label>Line Height</label>

<input id="lineheight" type="range" min="80" max="180" value="100">

</div>

</div>

<div class="editor">

<div
id="preview"
contenteditable="true"
spellcheck="false">

Type something...

</div>

</div>

</div>

<script>

const preview=document.getElementById("preview");

document.getElementById("size").oninput=function(){

preview.style.fontSize=this.value+"px";

}

document.getElementById("spacing").oninput=function(){

preview.style.letterSpacing=this.value+"px";

}

document.getElementById("lineheight").oninput=function(){

preview.style.lineHeight=this.value/100;

}

document.getElementById("darkBtn").onclick=function(){

document.body.classList.toggle("dark");

}

</script>

</body>
</html>
